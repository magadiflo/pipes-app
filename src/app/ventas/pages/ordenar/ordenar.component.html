<div class="text-layout">
    <h1>Pipes personalizados</h1>
    <p>Pipes creados por {{ 'nosotros' | mayusculas: enMayusculas }}</p>
    
</div>

<p-toolbar>
    <div class="p-toolbar-group-left">

    </div>
    
    <div class="p-toolbar-group-right">
        <button type="button" (click)="cambiar()" pButton type="button" title="Toggle mayúsculas" label="Toggle mayúsculas" icon="pi pi-sun" class="p-mr-1 p-button-help"></button>
        <button type="button" pButton icon="pi pi-sort" label="Por nombre"  title="Por nombre" class="p-mr-1"></button>
        <button type="button" pButton icon="pi pi-sort" label="Por valores" title="Por valores" class="p-mr-1 p-button-success"></button>
        <button type="button" pButton icon="pi pi-sort" label="Por color" title="Por color" class="p-mr-1 p-button-warning"></button>
    </div>
</p-toolbar>
<div class="p-grid">
    <div class="p-col p-mt-2">
        <p-table [value]="[]" responsiveLayout="scroll">
            <ng-template pTemplate="header">
                <tr>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Quantity</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-product>
                <tr>
                    <td>{{product.code}}</td>
                    <td>{{product.name}}</td>
                    <td>{{product.category}}</td>
                    <td>{{product.quantity}}</td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
